<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700&family=Cairo:wght@300;400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <title data-cms-bind="site_title">Portfolio</title>
</head>
<body>
    
    <header>
        <div class="logo" data-cms-bind="header_logo">الشعار هنا</div>

        <nav class="nav">
            <a href="#hero" data-cms-bind="nav_home">الرئيسية</a>
            <a href="#about" data-cms-bind="nav_about">من أنا؟</a>
            <a href="#gallery" data-cms-bind="nav_gallery">معرض الأعمال</a>
            <a href="#contact" data-cms-bind="nav_contact">تواصل معي</a>

    <section class="hero" id="hero">
        <div class="hero-content">

            <div class="hero-text">
                <h2 data-cms-bind="hero_title">عنوان</h2>
                <p data-cms-bind="hero_desc">الوصف</p>
                <a href="#gallery" data-cms-bind="hero_button_text">الأعمال</a>

            <div class="hero-photo">
                <img src="img/img-2.JPG" alt="Project" class="main-img" data-cms-bind="hero_img_main">
                <img src="img/img-3.JPG" alt="Project" class="bot-img" data-cms-bind="hero_img_bot1">
                <img src="img/img-1.JPG" alt="Project" class="bot-img" data-cms-bind="hero_img_bot2">
            </div>

        </div>
    </section>

    <section class="about" id="about">
        <div class="content-about">
            <h2 data-cms-bind="about_section_title">من أنا؟</h2>
            <div class="text-about">
                <h4 data-cms-bind="about_name">الاسم</h4>
                <p data-cms-bind="about_desc">وصف الخدمه هنا</p>
            </div>
        </div>

    </section>

    <section class="gallery" id="gallery">
        <h2 class="title" data-cms-bind="gallery_section_title">معرض الأعمال</h2>

        <div class="content-gallery">
            <div class="gallery-item"><img src="img/img-4.JPG" alt="Work 1" data-cms-bind="gallery_img_1"></div>
            <div class="gallery-item"><img src="img/img-5.JPG" alt="Work 2" data-cms-bind="gallery_img_2"></div>
            <div class="gallery-item"><img src="img/img-6.JPG" alt="Work 3" data-cms-bind="gallery_img_3"></div>
            <div class="gallery-item"><img src="img4.jpg" alt="Work 4" data-cms-bind="gallery_img_4"></div>
            <div class="gallery-item"><img src="img5.jpg" alt="Work 5" data-cms-bind="gallery_img_5"></div>
            <div class="gallery-item"><img src="img6.jpg" alt="Work 6" data-cms-bind="gallery_img_6"></div>
            <div class="gallery-item"><img src="img6.jpg" alt="Work 6" data-cms-bind="gallery_img_7"></div>
        </div>

    </section>

    <section class="contact" id="contact">
        <h2 class="title" data-cms-bind="contact_section_title">تواصل معي</h2>

        <div class="content">
            <a href="https://wa.me/966583881451" target="_blank" rel="noopener noreferrer" class="social-link" data-cms-bind="contact_whatsapp_link"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://snapchat.com/t/3VLR9FYw" target="_blank" rel="noopener noreferrer"  class="social-link" data-cms-bind="contact_snapchat_link"><i class="fa-brands fa-snapchat"></i></a>
            <a href="https://www.tiktok.com/@lkkkkk429?_r=1&_t=ZS-94WqlQrZTSK" target="_blank" rel="noopener noreferrer"  class="social-link" data-cms-bind="contact_tiktok_link"><i class="fa-brands fa-tiktok"></i></a>
        </div>

    </section>

    <footer>
        <div class="footer-top">

            <div class="footer-brand">
                <div class="footer-logo" data-cms-bind="footer_logo">الشعار هنا</div>
                <p data-cms-bind="footer_desc">وصف صغير يعبر عن الهوية هنا.</p>
            </div>

            <div class="footer-side">

                <div class="footer-group">
                    <h4 data-cms-bind="footer_links_title">روابط سريعة</h4>
                    <a href="#hero" data-cms-bind="footer_nav_home">الرئيسية</a>
                    <a href="#about" data-cms-bind="footer_nav_about">من أنا؟</a>
                </div>

                <div class="footer-group">
                    <h4 data-cms-bind="footer_contact_title">تواصل</h4>
                    <a href="https://wa.me/966583881451" target="_blank" rel="noopener noreferrer" data-cms-bind="footer_whatsapp_text">واتساب</a>
                    <a href="https://www.tiktok.com/@lkkkkk429?_r=1&_t=ZS-94WqlQrZTSK" target="_blank" data-cms-bind="footer_tiktok_text">تيك توك</a>
                </div>

            </div>

        </div>

        <div class="footer-bottom">
            <p class="copyright" data-cms-bind="footer_copyright">جميع الحقوق محفوظة © 2026 | اسمك</p>
        </div>

    </footer>

    <script src="script.js"></script>

    <script>
    if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
        if (!user) {
            window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
            });
        }
        });
    }
    </script>
    
</body>
</html>
