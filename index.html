<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700&family=Cairo:wght@300;400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Portfolio</title>
</head>
<body>
    
    <header>
        <div class="logo">الشعار هنا</div>

        <nav class="nav">
            <a href="#hero">الرئيسية</a>
            <a href="#about">من أنا؟</a>
            <a href="#gallery">معرض الأعمال</a>
            <a href="#contact">تواصل معي</a>
        </nav>

        <div class="hamburger">
            <i class="fa-solid fa-bars"></i>
        </div>

    </header>

    <section class="hero" id="hero">
        <div class="hero-content">

            <div class="hero-text">
                <h2>عنوان</h2>
                <p>الوصف</p>
                <a href="#gallery">الأعمال</a>
            </div>

            <div class="hero-photo">
                <img src="#" alt="Project" class="main-img">
                <img src="#" alt="Project" class="bot-img">
                <img src="#" alt="Project" class="bot-img">
            </div>

        </div>
    </section>

    <section class="about" id="about">
        <div class="content-about">
            <h2>من أنا؟</h2>
            <div class="text-about">
                <h4>الاسم</h4>
                <p>وصف الخدمه هنا</p>
            </div>
        </div>

    </section>

    <section class="gallery" id="gallery">
        <h2 class="title">معرض الأعمال</h2>

        <div class="content-gallery">
            <div class="gallery-item"><img src="img1.jpg" alt="Work 1"></div>
            <div class="gallery-item"><img src="img2.jpg" alt="Work 2"></div>
            <div class="gallery-item"><img src="img3.jpg" alt="Work 3"></div>
            <div class="gallery-item"><img src="img4.jpg" alt="Work 4"></div>
            <div class="gallery-item"><img src="img5.jpg" alt="Work 5"></div>
            <div class="gallery-item"><img src="img6.jpg" alt="Work 6"></div>
            <div class="gallery-item"><img src="img6.jpg" alt="Work 6"></div>
        </div>

    </section>

    <section class="contact" id="contact">
        <h2 class="title">تواصل معي</h2>

        <div class="content">
            <a href="#" class="social-link"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#" class="social-link"><i class="fa-regular fa-envelope"></i></a>
        </div>

    </section>

    <footer>
        <div class="footer-top">

            <div class="footer-brand">
                <div class="footer-logo">الشعار هنا</div>
                <p>وصف صغير يعبر عن الهوية هنا.</p>
            </div>

            <div class="footer-side">

                <div class="footer-group">
                    <h4>روابط سريعة</h4>
                    <a href="#hero">الرئيسية</a>
                    <a href="#about">من أنا؟</a>
                </div>

                <div class="footer-group">
                    <h4>تواصل</h4>
                    <a href="#">واتساب</a>
                    <a href="#">انستقرام</a>
                </div>

            </div>

        </div>

        <div class="footer-bottom">
            <p class="copyright">جميع الحقوق محفوظة © 2026 | اسمك</p>
        </div>

    </footer>

    <script src="script.js"></script>
</body>
</html>
